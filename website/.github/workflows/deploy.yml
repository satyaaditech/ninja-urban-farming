name: Deploy to GitHub Pages

on:
  # Trigger deploy setiap push ke branch main atau master
  push:
    branches: [main, master]
  # Izinkan manual deploy dari tab Actions
  workflow_dispatch:

# Izinkan job ini untuk push ke branch gh-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hindari deploy bersamaan
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: website

      - name: Build Astro site
        run: npm run build
        working-directory: website

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
